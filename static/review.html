<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>审价科工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-panel.collapsed .sidebar-body { display: none; }
        .sidebar-panel.collapsed .sidebar-collapsed-label { display: flex; }
        .sidebar-panel.collapsed { overflow: hidden; }
        .sidebar-collapsed-label { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-gray-100 font-sans text-gray-800">
    <header class="flex h-14 items-center justify-between border-b bg-white px-5 shadow-sm">
        <div>
            <h1 class="text-base font-semibold">审价科工作台</h1>
            <p class="text-xs text-gray-400">历史成本分析表审价</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="/static/copper-fees.html" class="text-sm text-blue-600 hover:text-blue-800">铜加工费</a>
            <a href="/static/pvc-material-prices.html" class="text-sm text-blue-600 hover:text-blue-800">PVC 材料价格</a>
            <a href="/static/pvc-boms.html" class="text-sm text-blue-600 hover:text-blue-800">PVC 母料 BOM</a>
            <a href="/static/review-batch.html" class="text-sm text-blue-600 hover:text-blue-800">批量操作</a>
            <a href="/static/copper-scenarios.html" class="text-sm text-blue-600 hover:text-blue-800">铜价区间测算</a>
            <span id="reviewerName" class="text-sm text-gray-600"></span>
            <button class="text-xs text-gray-400 hover:text-red-500" onclick="logout()">退出</button>
        </div>
    </header>

    <main id="reviewLayout" class="grid h-[calc(100vh-56px)] gap-3 p-3" style="grid-template-columns: 320px minmax(0,1fr) 320px;">
        <aside id="pendingPanel" class="sidebar-panel flex min-h-0 flex-col border bg-white shadow-sm">
            <button class="sidebar-collapsed-label hidden h-full w-full items-center justify-center gap-2 bg-orange-50 text-xs font-semibold text-orange-700 hover:bg-orange-100" onclick="toggleSidebar('pending')" title="展开待报价">
                <span>待报价</span>
                <span id="pendingCollapsedCount" class="font-mono text-gray-500">0</span>
            </button>
            <div class="sidebar-body flex min-h-0 flex-1 flex-col">
                <div class="border-b p-3">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex min-w-0 items-center gap-2">
                            <h2 class="text-sm font-semibold text-orange-700">待报价</h2>
                            <span id="pendingCount" class="text-xs text-gray-400">0</span>
                        </div>
                        <button class="border px-2 py-1 text-xs text-gray-500 hover:bg-gray-50" onclick="toggleSidebar('pending')" title="收起待报价">‹</button>
                    </div>
                    <input id="pendingSearch" class="mt-2 w-full border px-2 py-1.5 text-xs outline-none focus:border-orange-400" placeholder="搜索成本分析号..." oninput="renderLists()">
                </div>
                <div id="pendingList" class="flex-1 overflow-y-auto p-2"></div>
            </div>
        </aside>

        <section class="flex min-h-0 min-w-0 flex-col border bg-white shadow-sm">
            <div class="flex h-14 items-center justify-between border-b px-4">
                <div>
                    <h2 id="sheetTitle" class="text-sm font-semibold">选择成本分析号查看</h2>
                    <p id="sheetStatus" class="text-xs text-gray-400"></p>
                </div>
                <div id="sheetActions" class="hidden items-center gap-3">
                    <span id="saveStatus" class="text-xs text-gray-400"></span>
                    <button class="text-sm text-blue-600 hover:text-blue-800" onclick="exportExcel()">导出 Excel</button>
                    <button id="editBtn" class="text-sm text-blue-600 hover:text-blue-800" onclick="enableEditing()">编辑</button>
                    <button id="saveBtn" class="hidden text-sm text-green-600 hover:text-green-800" onclick="saveChanges()">保存</button>
                    <button id="cancelBtn" class="hidden text-sm text-gray-500 hover:text-gray-700" onclick="cancelEditing()">取消</button>
                    <button id="quoteBtn" class="text-sm text-orange-600 hover:text-orange-800" onclick="markQuoted()">标记已报价</button>
                </div>
            </div>
            <div id="calcParamsPanel" class="hidden border-b bg-slate-50 px-4 py-2">
                <div class="flex flex-wrap items-end gap-3">
                    <label class="text-xs text-gray-600">铜价（元/吨）
                        <input id="calcCopperPrice" type="number" min="0" step="0.01" class="mt-1 w-32 border px-2 py-1 text-xs">
                    </label>
                    <label class="text-xs text-gray-600">铜杆加工费
                        <input id="calcCopperRodFee" type="number" min="0" step="0.01" class="mt-1 w-28 border px-2 py-1 text-xs" value="1055">
                    </label>
                    <label class="text-xs text-gray-600">增值税率
                        <input id="calcVatRate" type="number" min="0" step="0.0001" class="mt-1 w-24 border px-2 py-1 text-xs" value="1.13">
                    </label>
                    <button class="border bg-blue-600 px-3 py-1 text-xs text-white hover:bg-blue-700" onclick="saveCalcParams()">保存参数</button>
                    <button class="border bg-orange-600 px-3 py-1 text-xs text-white hover:bg-orange-700" onclick="calculatePriceSummary()">一键计算最终售价</button>
                    <button class="border px-3 py-1 text-xs text-orange-700 hover:bg-orange-50" onclick="showPriceSummaryTraces()">查看售价过程</button>
                    <details class="text-xs text-gray-600">
                        <summary class="cursor-pointer border px-3 py-1 hover:bg-white">高级计算</summary>
                        <div class="mt-2 flex flex-wrap gap-2 border bg-white p-2">
                            <button class="border bg-green-600 px-3 py-1 text-xs text-white hover:bg-green-700" onclick="calculateConductor()">计算导体/编织</button>
                            <button class="border px-3 py-1 text-xs text-blue-600 hover:bg-blue-50" onclick="showConductorTraces()">查看导体/编织过程</button>
                            <button class="border bg-emerald-600 px-3 py-1 text-xs text-white hover:bg-emerald-700" onclick="calculateGlue()">计算胶料/外购</button>
                            <button class="border px-3 py-1 text-xs text-emerald-700 hover:bg-emerald-50" onclick="showGlueTraces()">查看胶料/外购过程</button>
                        </div>
                    </details>
                    <span id="calcParamStatus" class="text-xs text-gray-400"></span>
                </div>
            </div>
            <div id="emptyState" class="flex flex-1 items-center justify-center text-sm text-gray-400">从左右列表中选择一条报价单</div>
            <div id="sheetLoading" class="hidden flex flex-1 items-center justify-center text-sm text-gray-400">正在加载数据库内容...</div>
            <iframe id="sheetFrame" class="hidden h-full w-full flex-1 border-0 bg-gray-50" title="成本分析表"></iframe>
        </section>

        <aside id="quotedPanel" class="sidebar-panel flex min-h-0 flex-col border bg-white shadow-sm">
            <button class="sidebar-collapsed-label hidden h-full w-full items-center justify-center gap-2 bg-green-50 text-xs font-semibold text-green-700 hover:bg-green-100" onclick="toggleSidebar('quoted')" title="展开已报价">
                <span>已报价</span>
                <span id="quotedCollapsedCount" class="font-mono text-gray-500">0</span>
            </button>
            <div class="sidebar-body flex min-h-0 flex-1 flex-col">
                <div class="border-b p-3">
                    <div class="flex items-center justify-between gap-2">
                        <button class="border px-2 py-1 text-xs text-gray-500 hover:bg-gray-50" onclick="toggleSidebar('quoted')" title="收起已报价">›</button>
                        <div class="flex min-w-0 items-center gap-2">
                            <h2 class="text-sm font-semibold text-green-700">已报价</h2>
                            <span id="quotedCount" class="text-xs text-gray-400">0</span>
                        </div>
                    </div>
                    <input id="quotedSearch" class="mt-2 w-full border px-2 py-1.5 text-xs outline-none focus:border-green-400" placeholder="搜索成本分析号..." oninput="renderLists()">
                </div>
                <div id="quotedList" class="flex-1 overflow-y-auto p-2"></div>
            </div>
        </aside>
    </main>

    <div id="traceModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4">
        <div class="max-h-[82vh] w-full max-w-5xl overflow-auto border bg-white p-5 shadow-xl">
            <div class="mb-3 flex items-center justify-between">
                <h2 class="text-sm font-semibold">导体/编织计算过程</h2>
                <button class="text-xl text-gray-500" onclick="closeTraceModal()">×</button>
            </div>
            <div id="traceRows" class="space-y-3 text-xs"></div>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('token');
        const role = sessionStorage.getItem('role');
        if (!token) window.location.href = '/static/login.html';
        if (role !== 'reviewer') window.location.href = '/static/index.html';

        document.getElementById('reviewerName').textContent =
            (sessionStorage.getItem('displayName') || sessionStorage.getItem('userName') || '') + ' · 审价科';

        let pendingItems = [];
        let quotedItems = [];
        let selectedCode = '';
        let selectedStatus = '';
        const sidebarCollapsed = { pending: false, quoted: false };

        function logout() {
            sessionStorage.clear();
            window.location.href = '/static/login.html';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function formatUploadTime(value) {
            return value ? value.replace('T', ' ').substring(0, 19) : '-';
        }

        function toggleSidebar(side) {
            sidebarCollapsed[side] = !sidebarCollapsed[side];
            applySidebarState();
        }

        function applySidebarState() {
            document.getElementById('pendingPanel').classList.toggle('collapsed', sidebarCollapsed.pending);
            document.getElementById('quotedPanel').classList.toggle('collapsed', sidebarCollapsed.quoted);
            document.getElementById('reviewLayout').style.gridTemplateColumns =
                (sidebarCollapsed.pending ? '44px' : '320px') + ' minmax(0, 1fr) ' + (sidebarCollapsed.quoted ? '44px' : '320px');
        }

        async function loadHistory() {
            const res = await fetch('/api/v1/etl/review/history', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载失败');
            pendingItems = data.pending || [];
            quotedItems = data.quoted || [];
            renderLists();
        }

        function renderLists() {
            renderList('pendingList', pendingItems, document.getElementById('pendingSearch').value, 'pending');
            renderList('quotedList', quotedItems, document.getElementById('quotedSearch').value, 'quoted');
            document.getElementById('pendingCount').textContent = pendingItems.length;
            document.getElementById('quotedCount').textContent = quotedItems.length;
            document.getElementById('pendingCollapsedCount').textContent = pendingItems.length;
            document.getElementById('quotedCollapsedCount').textContent = quotedItems.length;
        }

        function renderList(elementId, items, keyword, status) {
            const kw = (keyword || '').trim().toUpperCase();
            const filtered = items.filter(item =>
                ((item.quotation_code || '') + ' ' + (item.bpm_no || '')).toUpperCase().includes(kw)
            );
            const element = document.getElementById(elementId);
            if (!filtered.length) {
                element.innerHTML = '<div class="py-4 text-center text-xs text-gray-400">暂无记录</div>';
                return;
            }
            element.innerHTML = filtered.map(item => {
                const active = item.quotation_code === selectedCode ? ' border-blue-400 bg-blue-50' : ' border-gray-200 hover:bg-gray-50';
                return '<button class="mb-2 w-full border p-2 text-left' + active + '" onclick="selectQuotation(\'' +
                    encodeURIComponent(item.quotation_code) + '\', \'' + status + '\')">' +
                    '<span class="block truncate font-mono text-xs text-gray-800">' + escapeHtml(item.quotation_code) + '</span>' +
                    '<span class="mt-1 block truncate font-mono text-xs text-blue-500">' + escapeHtml(item.bpm_no || '-') + '</span>' +
                    '<span class="mt-1 block truncate text-xs text-gray-400">' + escapeHtml(item.customer_name + ' ' + item.product_spec) + '</span>' +
                    '<span class="mt-1 block truncate text-xs text-gray-400">上传人：' + escapeHtml(item.upload_user) + '</span>' +
                    '<span class="mt-1 block font-mono text-xs text-gray-500">上传时间：' + escapeHtml(formatUploadTime(item.create_time)) + '</span>' +
                '</button>';
            }).join('');
        }

        async function selectQuotation(encodedCode, status) {
            selectedCode = decodeURIComponent(encodedCode);
            selectedStatus = status;
            renderLists();
            resetToolbar();
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('sheetFrame').classList.add('hidden');
            document.getElementById('sheetLoading').classList.remove('hidden');
            document.getElementById('sheetTitle').textContent = selectedCode;
            document.getElementById('sheetStatus').textContent = status === 'quoted' ? '已报价 · 只读' : '待报价 · 可编辑';
            document.getElementById('sheetActions').classList.remove('hidden');
            document.getElementById('sheetActions').classList.add('flex');
            document.getElementById('calcParamsPanel').classList.remove('hidden');
            document.getElementById('editBtn').classList.toggle('hidden', status === 'quoted');
            document.getElementById('quoteBtn').classList.toggle('hidden', status === 'quoted');
            loadCalcParams();
            try {
                const res = await fetch('/api/v1/etl/quotation/preview?code=' + encodeURIComponent(selectedCode), {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { const d = await res.json(); throw new Error(d.detail || '加载失败'); }
                document.getElementById('sheetFrame').srcdoc = await res.text();
                document.getElementById('sheetLoading').classList.add('hidden');
                document.getElementById('sheetFrame').classList.remove('hidden');
            } catch (err) {
                document.getElementById('sheetLoading').textContent = '加载失败：' + err.message;
            }
        }

        async function loadCalcParams() {
            if (!selectedCode) return;
            document.getElementById('calcParamStatus').textContent = '参数加载中...';
            const res = await fetch('/api/v1/etl/quotation/calc-params?code=' + encodeURIComponent(selectedCode), {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('calcParamStatus').textContent = data.detail || '参数加载失败';
                return;
            }
            document.getElementById('calcCopperPrice').value = data.copper_price || '';
            document.getElementById('calcCopperRodFee').value = data.copper_rod_process_fee || '1055';
            document.getElementById('calcVatRate').value = data.vat_rate || '1.13';
            document.getElementById('calcParamStatus').textContent = data.update_time ? '参数已加载' : '使用默认参数';
        }

        async function saveCalcParams() {
            if (!selectedCode) return;
            const body = {
                copper_price: document.getElementById('calcCopperPrice').value || null,
                copper_rod_process_fee: document.getElementById('calcCopperRodFee').value || '1055',
                vat_rate: document.getElementById('calcVatRate').value || '1.13',
            };
            document.getElementById('calcParamStatus').textContent = '保存中...';
            const res = await fetch('/api/v1/etl/quotation/calc-params?code=' + encodeURIComponent(selectedCode), {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('calcParamStatus').textContent = '';
                return alert('计算参数保存失败：' + (data.detail || '未知错误'));
            }
            document.getElementById('calcCopperPrice').value = data.copper_price || '';
            document.getElementById('calcCopperRodFee').value = data.copper_rod_process_fee || '1055';
            document.getElementById('calcVatRate').value = data.vat_rate || '1.13';
            document.getElementById('calcParamStatus').textContent = '参数已保存';
        }

        async function calculateConductor() {
            if (!selectedCode) return;
            if (!confirm('确认根据铜价和铜加工费重新计算导体/编织单价、材料金额和制程费用吗？')) return;
            document.getElementById('calcParamStatus').textContent = '导体/编织计算中...';
            const res = await fetch('/api/v1/etl/quotation/calculate/conductor?code=' + encodeURIComponent(selectedCode), {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('calcParamStatus').textContent = '';
                return alert('导体/编织计算失败：' + (data.detail || '未知错误'));
            }
            document.getElementById('calcParamStatus').textContent = '已计算材料 ' + data.calculated + ' 行，制程费用 ' + (data.process_calculated || 0) + ' 行';
            await selectQuotation(encodeURIComponent(selectedCode), selectedStatus);
        }

        async function showConductorTraces() {
            if (!selectedCode) return;
            const res = await fetch('/api/v1/etl/quotation/calculate/conductor/traces?code=' + encodeURIComponent(selectedCode), {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) return alert('计算过程加载失败：' + (data.detail || '未知错误'));
            const rows = data.items || [];
            document.getElementById('traceRows').innerHTML = rows.length ? rows.map(item =>
                '<div class="border p-3">' +
                '<div class="mb-1 font-semibold">' + escapeHtml(item.field_name) + ' = ' + escapeHtml(item.result_value) + '</div>' +
                '<div class="mb-1 text-gray-600">' + escapeHtml(item.formula) + '</div>' +
                '<pre class="whitespace-pre-wrap text-gray-700">' + escapeHtml(item.process_text) + '</pre>' +
                '</div>'
            ).join('') : '<div class="py-6 text-center text-gray-400">暂无导体/编织计算过程</div>';
            document.getElementById('traceModal').classList.replace('hidden', 'flex');
        }

        async function calculateGlue() {
            if (!selectedCode) return;
            if (!confirm('确认重新计算 C 开头胶料、外购物料的单价、材料金额，以及绝缘/外被/倒线/集合制程费用吗？')) return;
            document.getElementById('calcParamStatus').textContent = '胶料/外购计算中...';
            const res = await fetch('/api/v1/etl/quotation/calculate/glue?code=' + encodeURIComponent(selectedCode), {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('calcParamStatus').textContent = '';
                return alert('胶料/外购计算失败：' + (data.detail || '未知错误'));
            }
            document.getElementById('calcParamStatus').textContent = '已计算胶料 ' + (data.c_calculated || 0) + ' 行，外购 ' + (data.external_calculated || 0) + ' 行，色母 ' + (data.color_masterbatch_calculated || 0) + ' 行，绝缘制程 ' + (data.insulation_process_calculated || 0) + ' 行，外被制程 ' + (data.jacket_process_calculated || 0) + ' 行，倒线制程 ' + (data.rewind_process_calculated || 0) + ' 行，集合制程 ' + (data.collection_process_calculated || 0) + ' 行';
            await selectQuotation(encodeURIComponent(selectedCode), selectedStatus);
        }

        async function showGlueTraces() {
            if (!selectedCode) return;
            const res = await fetch('/api/v1/etl/quotation/calculate/glue/traces?code=' + encodeURIComponent(selectedCode), {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) return alert('胶料/外购计算过程加载失败：' + (data.detail || '未知错误'));
            const rows = data.items || [];
            document.getElementById('traceRows').innerHTML = rows.length ? rows.map(item =>
                '<div class="border p-3">' +
                '<div class="mb-1 font-semibold">' + escapeHtml(item.field_name) + ' = ' + escapeHtml(item.result_value) + '</div>' +
                '<div class="mb-1 text-gray-600">' + escapeHtml(item.formula) + '</div>' +
                '<pre class="whitespace-pre-wrap text-gray-700">' + escapeHtml(item.process_text) + '</pre>' +
                '</div>'
            ).join('') : '<div class="py-6 text-center text-gray-400">暂无胶料/外购计算过程</div>';
            document.getElementById('traceModal').classList.replace('hidden', 'flex');
        }

        async function calculatePriceSummary() {
            if (!selectedCode) return;
            if (!confirm('确认按当前全部逻辑一键计算最终售价吗？系统会依次计算导体/编织、胶料/外购、制程费用和最终售价。')) return;
            document.getElementById('calcParamStatus').textContent = '最终售价计算中...';
            const res = await fetch('/api/v1/etl/quotation/calculate/full-price?code=' + encodeURIComponent(selectedCode), {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('calcParamStatus').textContent = '';
                return alert('一键计算失败：' + (data.detail || '未知错误'));
            }
            const statusText = buildFullPriceStatus(data);
            await selectQuotation(encodeURIComponent(selectedCode), selectedStatus);
            document.getElementById('calcParamStatus').textContent = statusText;
        }

        function buildFullPriceStatus(data) {
            const conductor = data.conductor || {};
            const glue = data.glue || {};
            const price = data.price_summary || {};
            return '最终售价已计算：导体/编织 ' + (conductor.calculated || 0) +
                ' 行，胶料 ' + (glue.c_calculated || 0) +
                ' 行，外购 ' + (glue.external_calculated || 0) +
                ' 行，色母 ' + (glue.color_masterbatch_calculated || 0) +
                ' 行，手填兜底 ' + (glue.manual_material_calculated || 0) +
                ' 行，最终售价 ' + (price.final_selling_price || '-');
        }

        async function showPriceSummaryTraces() {
            if (!selectedCode) return;
            const res = await fetch('/api/v1/etl/quotation/calculate/price-summary/traces?code=' + encodeURIComponent(selectedCode), {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await res.json();
            if (!res.ok) return alert('售价计算过程加载失败：' + (data.detail || '未知错误'));
            const rows = data.items || [];
            document.getElementById('traceRows').innerHTML = rows.length ? rows.map(item =>
                '<div class="border p-3">' +
                '<div class="mb-1 font-semibold">' + escapeHtml(item.field_name) + ' = ' + escapeHtml(item.result_value) + '</div>' +
                '<div class="mb-1 text-gray-600">' + escapeHtml(item.formula) + '</div>' +
                '<pre class="whitespace-pre-wrap text-gray-700">' + escapeHtml(item.process_text) + '</pre>' +
                '</div>'
            ).join('') : '<div class="py-6 text-center text-gray-400">暂无售价计算过程</div>';
            document.getElementById('traceModal').classList.replace('hidden', 'flex');
        }

        function closeTraceModal() {
            document.getElementById('traceModal').classList.replace('flex', 'hidden');
        }

        function resetToolbar() {
            document.getElementById('editBtn').classList.remove('hidden');
            document.getElementById('saveBtn').classList.add('hidden');
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('saveStatus').textContent = '';
        }

        function enableEditing() {
            if (selectedStatus === 'quoted') return;
            document.getElementById('sheetFrame').contentDocument.querySelectorAll('.sheet-input')
                .forEach(input => { input.disabled = false; });
            document.getElementById('editBtn').classList.add('hidden');
            document.getElementById('saveBtn').classList.remove('hidden');
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('saveStatus').textContent = '编辑中';
        }

        function cancelEditing() {
            if (selectedCode) selectQuotation(encodeURIComponent(selectedCode), selectedStatus);
        }

        async function saveChanges() {
            const inputs = document.getElementById('sheetFrame').contentDocument.querySelectorAll('.sheet-input');
            const changes = Array.from(inputs).filter(input => input.value !== input.defaultValue).map(input => ({
                entity: input.dataset.entity,
                id: Number(input.dataset.id),
                field: input.dataset.field,
                value: input.value,
            }));
            if (!changes.length) {
                document.getElementById('saveStatus').textContent = '没有修改';
                return;
            }
            const res = await fetch('/api/v1/etl/quotation?code=' + encodeURIComponent(selectedCode), {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ changes }),
            });
            const data = await res.json();
            if (!res.ok) return alert('保存失败：' + (data.detail || '未知错误'));
            selectedCode = data.quotation_code;
            await loadHistory();
            await selectQuotation(encodeURIComponent(selectedCode), 'pending');
            document.getElementById('saveStatus').textContent = '已保存';
        }

        async function markQuoted() {
            if (!selectedCode || !confirm('确认将 ' + selectedCode + ' 标记为已报价吗？标记后将只能查看。')) return;
            const res = await fetch('/api/v1/etl/quotation/review-status?code=' + encodeURIComponent(selectedCode), {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'quoted' }),
            });
            const data = await res.json();
            if (!res.ok) return alert('标记失败：' + (data.detail || '未知错误'));
            await loadHistory();
            await selectQuotation(encodeURIComponent(selectedCode), 'quoted');
        }

        async function exportExcel() {
            if (!selectedCode) return;
            const res = await fetch('/api/v1/etl/quotation/export?code=' + encodeURIComponent(selectedCode), {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) { const d = await res.json(); return alert('导出失败：' + (d.detail || '未知错误')); }
            const url = URL.createObjectURL(await res.blob());
            const link = document.createElement('a');
            link.href = url;
            link.download = selectedCode + '.xlsx';
            link.click();
            URL.revokeObjectURL(url);
        }

        loadHistory().catch(err => alert('加载失败：' + err.message));
    </script>
</body>
</html>
