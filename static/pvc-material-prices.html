<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>PVC 材料价格维护</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-800">
    <header class="flex h-14 items-center justify-between border-b bg-white px-5 shadow-sm">
        <div class="flex items-center gap-4">
            <a href="/static/review.html" class="text-sm text-blue-600 hover:text-blue-800">返回审价科工作台</a>
            <h1 class="text-base font-semibold">PVC 材料价格</h1>
        </div>
        <span id="reviewerName" class="text-sm text-gray-500"></span>
    </header>

    <main class="mx-auto max-w-7xl p-4">
        <section class="mb-3 border bg-white p-3 shadow-sm">
            <div class="flex flex-wrap items-center gap-3">
                <input id="keyword" class="w-72 border px-2 py-1.5 text-sm" placeholder="按材料编号或名称查询" oninput="loadPrices()">
                <button class="border bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-700" onclick="openEditor()">新增价格版本</button>
                <span id="resultCount" class="text-xs text-gray-400"></span>
            </div>
        </section>

        <section class="overflow-x-auto border bg-white shadow-sm">
            <table class="w-full min-w-[1120px] border-collapse text-sm">
                <thead class="bg-gray-100 text-left">
                    <tr>
                        <th class="border-b px-3 py-2">材料编号</th>
                        <th class="border-b px-3 py-2">材料名称</th>
                        <th class="border-b px-3 py-2">单位</th>
                        <th class="border-b px-3 py-2">未税单价</th>
                        <th class="border-b px-3 py-2">生效日期</th>
                        <th class="border-b px-3 py-2">状态</th>
                        <th class="border-b px-3 py-2">操作人</th>
                        <th class="border-b px-3 py-2">更新时间</th>
                        <th class="border-b px-3 py-2">操作</th>
                    </tr>
                </thead>
                <tbody id="priceRows"></tbody>
            </table>
        </section>
    </main>

    <div id="editorModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
        <form class="w-full max-w-xl border bg-white p-5 shadow-xl" onsubmit="savePrice(event)">
            <h2 id="editorTitle" class="mb-4 text-base font-semibold">新增 PVC 材料价格版本</h2>
            <input id="rowId" type="hidden">
            <div class="grid grid-cols-2 gap-3">
                <label class="text-sm">材料编号<input id="prdNo" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="text-sm">材料单位<input id="unit" class="mt-1 w-full border px-2 py-1.5" required placeholder="KG"></label>
                <label class="col-span-2 text-sm">材料名称<input id="materialName" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="text-sm">未税单价<input id="unitPrice" type="number" min="0" step="0.000001" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="text-sm">生效日期<input id="effectiveDate" type="date" class="mt-1 w-full border px-2 py-1.5"></label>
                <label class="col-span-2 text-sm">备注<input id="remark" class="mt-1 w-full border px-2 py-1.5"></label>
            </div>
            <p class="mt-3 text-xs text-gray-400">价格变化时请新增版本；编辑仅用于纠正当前选中的历史记录。</p>
            <div class="mt-5 flex justify-end gap-3">
                <button type="button" class="text-sm text-gray-500" onclick="closeEditor()">取消</button>
                <button class="border bg-blue-600 px-4 py-1.5 text-sm text-white">保存</button>
            </div>
        </form>
    </div>

    <div id="logsModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
        <div class="max-h-[80vh] w-full max-w-4xl overflow-auto border bg-white p-5 shadow-xl">
            <div class="mb-3 flex justify-between">
                <h2 id="logsTitle" class="font-semibold">修改日志</h2>
                <button class="text-xl text-gray-500" onclick="closeLogs()" title="关闭">×</button>
            </div>
            <div id="logRows" class="space-y-2 text-xs"></div>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('token');
        if (!token) window.location.href = '/static/login.html';
        if (sessionStorage.getItem('role') !== 'reviewer') window.location.href = '/static/index.html';
        document.getElementById('reviewerName').textContent = sessionStorage.getItem('displayName') || '';
        let prices = [];

        function headers(json = false) {
            const value = { 'Authorization': 'Bearer ' + token };
            if (json) value['Content-Type'] = 'application/json';
            return value;
        }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str ?? ''; return div.innerHTML; }
        function displayTime(value) { return (value || '').replace('T', ' ').substring(0, 19); }

        async function loadPrices() {
            const keyword = document.getElementById('keyword').value.trim();
            const res = await fetch('/api/v1/pvc-material-prices?keyword=' + encodeURIComponent(keyword), { headers: headers() });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '加载失败');
            prices = data.items;
            document.getElementById('resultCount').textContent = prices.length + ' 条价格版本';
            document.getElementById('priceRows').innerHTML = prices.length ? prices.map(item =>
                '<tr class="border-b ' + (item.is_current ? 'bg-green-50/40' : '') + '">' +
                '<td class="px-3 py-2 font-mono">' + escapeHtml(item.prd_no) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.name) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.unit) + '</td>' +
                '<td class="px-3 py-2 font-mono">' + escapeHtml(item.unit_price) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.effective_date || '-') + '</td>' +
                '<td class="px-3 py-2">' + (item.is_current ? '<span class="text-green-700">当前</span>' : '<span class="text-gray-400">历史</span>') + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.operator) + '</td>' +
                '<td class="px-3 py-2 text-xs text-gray-500">' + displayTime(item.update_time || item.create_time) + '</td>' +
                '<td class="px-3 py-2"><button class="mr-2 text-blue-600" onclick="openEditor(' + item.id + ')">编辑</button>' +
                '<button class="mr-2 text-gray-600" onclick="showLogs(\'' + encodeURIComponent(item.prd_no) + '\')">日志</button>' +
                '<button class="text-red-500" onclick="deletePrice(' + item.id + ')">删除</button></td></tr>'
            ).join('') : '<tr><td colspan="9" class="px-3 py-8 text-center text-sm text-gray-400">暂无记录</td></tr>';
        }

        function openEditor(id = null) {
            const item = prices.find(value => value.id === id);
            document.getElementById('editorTitle').textContent = item ? '纠正 PVC 材料价格版本' : '新增 PVC 材料价格版本';
            document.getElementById('rowId').value = item?.id || '';
            document.getElementById('prdNo').value = item?.prd_no || '';
            document.getElementById('materialName').value = item?.name || '';
            document.getElementById('unit').value = item?.unit || 'KG';
            document.getElementById('unitPrice').value = item?.unit_price || '';
            document.getElementById('effectiveDate').value = item?.effective_date || '';
            document.getElementById('remark').value = item?.remark || '';
            document.getElementById('editorModal').classList.replace('hidden', 'flex');
        }
        function closeEditor() { document.getElementById('editorModal').classList.replace('flex', 'hidden'); }

        async function savePrice(event) {
            event.preventDefault();
            const id = document.getElementById('rowId').value;
            const body = {
                prd_no: document.getElementById('prdNo').value,
                name: document.getElementById('materialName').value,
                unit: document.getElementById('unit').value,
                unit_price: document.getElementById('unitPrice').value,
                effective_date: document.getElementById('effectiveDate').value || null,
                remark: document.getElementById('remark').value,
            };
            const res = await fetch('/api/v1/pvc-material-prices' + (id ? '/' + id : ''), {
                method: id ? 'PATCH' : 'POST', headers: headers(true), body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '保存失败');
            closeEditor();
            loadPrices();
        }

        async function deletePrice(id) {
            if (!confirm('确认删除该价格版本吗？删除动作会保留在修改日志中。')) return;
            const res = await fetch('/api/v1/pvc-material-prices/' + id, { method: 'DELETE', headers: headers() });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '删除失败');
            loadPrices();
        }

        async function showLogs(encodedPrdNo) {
            const prdNo = decodeURIComponent(encodedPrdNo);
            const res = await fetch('/api/v1/pvc-material-prices/logs?prd_no=' + encodeURIComponent(prdNo), { headers: headers() });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '日志加载失败');
            document.getElementById('logsTitle').textContent = prdNo + ' 修改日志';
            document.getElementById('logRows').innerHTML = data.items.length ? data.items.map(log =>
                '<div class="border p-2"><b>' + escapeHtml(log.action) + '</b> · ' + escapeHtml(log.operator) + ' · ' + displayTime(log.operate_time) +
                '<pre class="mt-1 overflow-auto text-gray-500">' + escapeHtml(JSON.stringify({ before: log.before_data, after: log.after_data }, null, 2)) + '</pre></div>'
            ).join('') : '<div class="py-4 text-center text-gray-400">暂无日志</div>';
            document.getElementById('logsModal').classList.replace('hidden', 'flex');
        }
        function closeLogs() { document.getElementById('logsModal').classList.replace('flex', 'hidden'); }
        loadPrices();
    </script>
</body>
</html>
