<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>PVC 材料价格维护</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-800">
    <header class="flex h-14 items-center justify-between border-b bg-white px-5 shadow-sm">
        <div class="flex items-center gap-4">
            <a href="/static/review.html" class="text-sm text-blue-600 hover:text-blue-800">返回审价科工作台</a>
            <h1 class="text-base font-semibold">PVC 材料价格</h1>
        </div>
        <span id="reviewerName" class="text-sm text-gray-500"></span>
    </header>

    <main class="mx-auto max-w-7xl p-4">
        <section class="mb-3 border bg-white p-3 shadow-sm">
            <div class="flex flex-wrap items-center gap-3">
                <input id="keyword" class="w-72 border px-2 py-1.5 text-sm" placeholder="按材料代号或名称查询" oninput="loadPrices()">
                <button class="border bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-700" onclick="openEditor()">新增/更新材料</button>
                <label class="cursor-pointer border px-3 py-1.5 text-sm text-blue-600 hover:bg-blue-50">
                    导入最新单价<input id="importFile" type="file" accept=".xlsx" class="hidden" onchange="importExcel()">
                </label>
                <span id="resultCount" class="text-xs text-gray-400"></span>
            </div>
        </section>

        <section class="overflow-x-auto border bg-white shadow-sm">
            <table class="w-full min-w-[980px] border-collapse text-sm">
                <thead class="bg-gray-100 text-left">
                    <tr>
                        <th class="border-b px-3 py-2">材料代号</th>
                        <th class="border-b px-3 py-2">材料名称</th>
                        <th class="border-b px-3 py-2">单位</th>
                        <th class="border-b px-3 py-2">单价</th>
                        <th class="border-b px-3 py-2">状态</th>
                        <th class="border-b px-3 py-2">BOM 使用次数</th>
                        <th class="border-b px-3 py-2">更新人</th>
                        <th class="border-b px-3 py-2">更新时间</th>
                        <th class="border-b px-3 py-2">操作</th>
                    </tr>
                </thead>
                <tbody id="priceRows"></tbody>
            </table>
        </section>
    </main>

    <div id="editorModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
        <form class="w-full max-w-xl border bg-white p-5 shadow-xl" onsubmit="savePrice(event)">
            <h2 id="editorTitle" class="mb-4 text-base font-semibold">维护 PVC 材料价格</h2>
            <input id="rowId" type="hidden">
            <div class="grid grid-cols-2 gap-3">
                <label class="text-sm">材料代号<input id="prdNo" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="text-sm">材料单位<input id="unit" class="mt-1 w-full border px-2 py-1.5" required placeholder="KG"></label>
                <label class="col-span-2 text-sm">材料名称<input id="materialName" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="text-sm">单价<input id="unitPrice" type="number" min="0" step="0.000001" class="mt-1 w-full border px-2 py-1.5" required></label>
                <label class="col-span-2 text-sm">备注<input id="remark" class="mt-1 w-full border px-2 py-1.5"></label>
            </div>
            <div class="mt-5 flex justify-end gap-3">
                <button type="button" class="text-sm text-gray-500" onclick="closeEditor()">取消</button>
                <button class="border bg-blue-600 px-4 py-1.5 text-sm text-white">保存</button>
            </div>
        </form>
    </div>

    <script>
        const token = sessionStorage.getItem('token');
        if (!token) window.location.href = '/static/login.html';
        if (sessionStorage.getItem('role') !== 'reviewer') window.location.href = '/static/index.html';
        document.getElementById('reviewerName').textContent = sessionStorage.getItem('displayName') || '';
        let prices = [];

        function headers(json = false) {
            const value = { 'Authorization': 'Bearer ' + token };
            if (json) value['Content-Type'] = 'application/json';
            return value;
        }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str ?? ''; return div.innerHTML; }
        function displayTime(value) { return (value || '').replace('T', ' ').substring(0, 19); }

        async function loadPrices() {
            const keyword = document.getElementById('keyword').value.trim();
            const res = await fetch('/api/v1/pvc-material-prices?keyword=' + encodeURIComponent(keyword), { headers: headers() });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '加载失败');
            prices = data.items || [];
            const missing = prices.filter(item => !item.has_price).length;
            document.getElementById('resultCount').textContent = prices.length + ' 条材料价格，缺价 ' + missing + ' 条';
            document.getElementById('priceRows').innerHTML = prices.length ? prices.map(item =>
                '<tr class="border-b ' + (item.has_price ? '' : 'bg-red-50') + '">' +
                '<td class="px-3 py-2 font-mono">' + escapeHtml(item.prd_no) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.name) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.unit) + '</td>' +
                '<td class="px-3 py-2 font-mono">' + escapeHtml(item.unit_price || '-') + '</td>' +
                '<td class="px-3 py-2">' + (item.has_price ? '<span class="text-green-700">已维护</span>' : '<span class="text-red-600">缺价</span>') + '</td>' +
                '<td class="px-3 py-2 font-mono">' + escapeHtml(item.used_count) + '</td>' +
                '<td class="px-3 py-2">' + escapeHtml(item.operator) + '</td>' +
                '<td class="px-3 py-2 text-xs text-gray-500">' + displayTime(item.update_time || item.create_time) + '</td>' +
                '<td class="px-3 py-2"><button class="text-blue-600" onclick="openEditorByCode(\'' + encodeURIComponent(item.prd_no) + '\')">编辑</button></td></tr>'
            ).join('') : '<tr><td colspan="9" class="px-3 py-8 text-center text-sm text-gray-400">暂无材料</td></tr>';
        }

        function openEditor(id = null) {
            const item = prices.find(value => value.id === id) || null;
            fillEditor(item);
        }
        function openEditorByCode(encodedCode) {
            const code = decodeURIComponent(encodedCode);
            fillEditor(prices.find(value => value.prd_no === code) || { prd_no: code, unit: 'KG' });
        }
        function fillEditor(item) {
            document.getElementById('rowId').value = item?.id || '';
            document.getElementById('prdNo').value = item?.prd_no || '';
            document.getElementById('materialName').value = item?.name || '';
            document.getElementById('unit').value = item?.unit || 'KG';
            document.getElementById('unitPrice').value = item?.unit_price || '';
            document.getElementById('remark').value = item?.remark || '';
            document.getElementById('editorModal').classList.replace('hidden', 'flex');
        }
        function closeEditor() { document.getElementById('editorModal').classList.replace('flex', 'hidden'); }

        async function savePrice(event) {
            event.preventDefault();
            const id = document.getElementById('rowId').value;
            const body = {
                prd_no: document.getElementById('prdNo').value,
                name: document.getElementById('materialName').value,
                unit: document.getElementById('unit').value,
                unit_price: document.getElementById('unitPrice').value,
                remark: document.getElementById('remark').value,
            };
            const res = await fetch('/api/v1/pvc-material-prices' + (id ? '/' + id : ''), {
                method: id ? 'PATCH' : 'POST', headers: headers(true), body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) return alert(data.detail || '保存失败');
            closeEditor();
            loadPrices();
        }

        async function importExcel() {
            const fileInput = document.getElementById('importFile');
            const file = fileInput.files[0];
            if (!file) return;
            const form = new FormData();
            form.append('file', file);
            const res = await fetch('/api/v1/pvc-material-prices/import/excel', { method: 'POST', headers: headers(), body: form });
            const data = await res.json();
            fileInput.value = '';
            if (!res.ok) return alert(data.detail || '导入失败');
            let message = '导入完成：新增 ' + data.created + ' 条，更新 ' + data.updated + ' 条，跳过 ' + data.skipped + ' 条';
            if (data.errors && data.errors.length) message += '\n\n' + data.errors.join('\n');
            alert(message);
            loadPrices();
        }

        loadPrices();
    </script>
</body>
</html>
