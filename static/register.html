<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 报价单 ETL 入库系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">注册账号</h1>
        <p class="text-sm text-gray-500 text-center mb-6">选择所属部门并创建账号</p>
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">所属部门</label>
                <select id="tenantCode" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入用户名">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
            </div>
            <div id="regError" class="text-sm text-red-600 hidden"></div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                注册
            </button>
        </form>
        <p class="text-sm text-gray-500 text-center mt-4">
            已有账号？<a href="/static/login.html" class="text-blue-600 hover:underline">登录</a>
        </p>
    </div>

    <script>
        if (sessionStorage.getItem('token')) { window.location.href = '/static/index.html'; }
        // 加载租户列表
        (async () => {
            try {
                const res = await fetch('/api/v1/auth/tenants');
                const tenants = await res.json();
                const select = document.getElementById('tenantCode');
                tenants.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.code;
                    opt.textContent = t.display_name;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('加载租户列表失败', err);
            }
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('regError');
            errorDiv.classList.add('hidden');

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tenant_code: document.getElementById('tenantCode').value,
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '注册失败');

                // 注册成功直接登录
                sessionStorage.setItem('token', data.token);
                sessionStorage.setItem('tenantId', data.tenant_id);
                sessionStorage.setItem('tenantName', data.tenant_name);
                sessionStorage.setItem('userName', data.username);
                window.location.href = '/static/index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
