<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>登录 - 成本分析表 ETL 入库系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">成本分析表 ETL 入库</h1>
        <p class="text-sm text-gray-500 text-center mb-6">请登录</p>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入用户名">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
            </div>
            <div id="loginError" class="text-sm text-red-600 hidden"></div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                登录
            </button>
        </form>
    </div>

    <script>
        if (sessionStorage.getItem('token')) {
            window.location.href = sessionStorage.getItem('role') === 'reviewer' ? '/static/review.html' : '/static/index.html';
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('hidden');

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '登录失败');

                sessionStorage.setItem('token', data.token);
                sessionStorage.setItem('tenantId', data.tenant_id);
                sessionStorage.setItem('tenantName', data.tenant_name);
                sessionStorage.setItem('userName', data.username);
                sessionStorage.setItem('displayName', data.display_name || data.username);
                sessionStorage.setItem('isAdmin', data.is_admin ? '1' : '');
                sessionStorage.setItem('role', data.role || 'engineering');
                window.location.href = data.role === 'reviewer' ? '/static/review.html' : '/static/index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
