<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>铜价区间测算</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 text-gray-800">
    <header class="flex h-14 items-center justify-between border-b bg-white px-5 shadow-sm">
        <div>
            <h1 class="text-base font-semibold">铜价区间测算</h1>
            <p class="text-xs text-gray-400">按 BPM 流程号测算各铜段最终售价，不覆盖正式报价数据</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="/static/review-v2/index.html" class="text-sm text-blue-600 hover:text-blue-800">返回工作台</a>
            <a href="/static/review-v2/batch.html" class="text-sm text-blue-600 hover:text-blue-800">批量操作</a>
            <button class="text-xs text-gray-400 hover:text-red-500" onclick="logout()">退出</button>
        </div>
    </header>

    <main class="p-4">
        <section class="border bg-white p-4 shadow-sm">
            <div class="flex flex-wrap items-end gap-3">
                <label class="text-sm text-gray-600">BPM流程号
                    <input id="bpmNo" class="mt-1 w-60 border px-3 py-2 text-sm font-mono uppercase" placeholder="EG-B015-26050127">
                </label>
                <button id="calcBtn" class="border bg-blue-600 px-4 py-2 text-sm text-white hover:bg-blue-700" onclick="calculateScenario()">开始测算</button>
                <span id="statusText" class="text-sm text-gray-400"></span>
            </div>
        </section>

        <section class="mt-4 border bg-white shadow-sm">
            <div class="border-b px-4 py-3 text-sm font-semibold">最终售价矩阵</div>
            <div id="resultWrap" class="overflow-auto">
                <div class="px-4 py-10 text-center text-sm text-gray-400">输入 BPM 流程号后开始测算</div>
            </div>
        </section>
    </main>

    <script>
        const token = sessionStorage.getItem('token');
        if (!token) window.location.href = '/static/login.html';
        if (sessionStorage.getItem('role') !== 'reviewer') window.location.href = '/static/index.html';

        function logout() { sessionStorage.clear(); window.location.href = '/static/login.html'; }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
        async function calculateScenario() {
            const bpmNo = (document.getElementById('bpmNo').value || '').trim().toUpperCase();
            if (!bpmNo) return alert('请填写 BPM流程号');
            const btn = document.getElementById('calcBtn');
            btn.disabled = true;
            document.getElementById('statusText').textContent = '测算中...';
            try {
                const res = await fetch('/api/v1/etl/quotation/copper-scenarios', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bpm_no: bpmNo }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '测算失败');
                renderResult(data);
                document.getElementById('statusText').textContent = '共 ' + (data.items || []).length + ' 张成本分析表';
            } catch (err) {
                document.getElementById('statusText').textContent = '';
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        }
        function renderResult(data) {
            const bands = data.bands || [];
            const items = data.items || [];
            if (!items.length) {
                document.getElementById('resultWrap').innerHTML = '<div class="px-4 py-10 text-center text-sm text-gray-400">暂无结果</div>';
                return;
            }
            const head = '<tr class="bg-gray-50 text-xs text-gray-500">' +
                '<th class="sticky left-0 z-10 border-b bg-gray-50 px-3 py-2 text-left">成本分析号</th>' +
                '<th class="border-b px-3 py-2 text-left">当前最终售价</th>' +
                bands.map(b => '<th class="border-b px-3 py-2 text-right font-mono">' + escapeHtml(b.label) + '<br><span class="text-gray-400">按' + escapeHtml(String(b.copper_price)) + '</span></th>').join('') +
                '</tr>';
            const rows = items.map(item => '<tr class="hover:bg-gray-50">' +
                '<td class="sticky left-0 z-10 border-b bg-white px-3 py-2">' +
                    '<div class="font-mono text-xs text-gray-800">' + escapeHtml(item.quotation_code) + '</div>' +
                    '<div class="max-w-60 truncate text-xs text-gray-400">' + escapeHtml(item.product_spec) + '</div>' +
                    (item.errors && item.errors.length ? '<div class="mt-1 text-xs text-red-500">' + escapeHtml(item.errors.join('；')) + '</div>' : '') +
                '</td>' +
                '<td class="border-b px-3 py-2 text-right font-mono text-xs">' + escapeHtml(item.current_final_selling_price || '-') + '</td>' +
                (item.bands || []).map(b => '<td class="border-b px-3 py-2 text-right font-mono text-xs ' + (b.error ? 'text-red-500' : 'text-blue-700') + '">' + escapeHtml(b.final_selling_price || b.error || '-') + '</td>').join('') +
                '</tr>').join('');
            document.getElementById('resultWrap').innerHTML =
                '<table class="min-w-full border-collapse">' +
                '<thead>' + head + '</thead>' +
                '<tbody>' + rows + '</tbody>' +
                '</table>';
        }
    </script>
</body>
</html>
