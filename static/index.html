<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>成本分析表 ETL 入库系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <div id="deleteToast" class="fixed right-4 top-4 z-[80] hidden min-w-72 max-w-md border border-green-200 bg-white shadow-lg">
        <div class="flex items-start justify-between gap-4 px-4 py-3">
            <div>
                <div class="text-sm font-semibold text-green-700">删除成功</div>
                <div id="deleteToastText" class="mt-0.5 text-sm text-gray-700"></div>
            </div>
            <button class="text-lg leading-none text-gray-400 hover:text-gray-700" onclick="hideDeleteToast()" title="关闭">×</button>
        </div>
    </div>

    <!-- 顶部栏 -->
    <header class="bg-white shadow-sm border-b sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-800">成本分析表 ETL 入库</h1>
            <div class="flex items-center gap-3">
                <div id="greetingBox" class="flex items-center gap-2.5 bg-gradient-to-r from-blue-50 to-indigo-50 px-3 py-1.5 rounded-full border border-blue-100"></div>
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 transition">退出</button>
            </div>
        </div>
    </header>

    <!-- 主体：左侧历史 + 右侧操作区 -->
    <div class="max-w-7xl mx-auto px-4 py-6 flex gap-6">
        <!-- 左侧：上传历史 -->
        <aside class="w-80 shrink-0">
            <div class="bg-white rounded-lg shadow-md p-4 sticky top-16">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-semibold text-gray-700">上传历史</h2>
                    <button class="text-xs text-blue-600 hover:underline" onclick="loadHistory((document.getElementById('historySearch').value || '').trim())">刷新</button>
                </div>
                <input type="text" id="historySearch" placeholder="搜索成本分析号 / BPM流程号..."
                    class="w-full text-xs px-3 py-1.5 border rounded mb-3 focus:outline-none focus:ring-1 focus:ring-blue-400"
                    oninput="filterHistory()">
                <div id="historyList" class="space-y-2 max-h-[calc(100vh-220px)] overflow-y-auto">
                    <div class="text-sm text-gray-400 text-center py-4">加载中...</div>
                </div>
            </div>
        </aside>

        <!-- 右侧：上传 + 进度 -->
        <main class="flex-1 min-w-0">
            <!-- 上传区域 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-lg font-semibold mb-4 text-blue-600">上传成本分析表</h2>
                <p class="text-sm text-gray-600 mb-4">支持 .xlsx / .xls 格式，系统将自动拆分 Sheet 并入库。BPM流程号为必填。</p>
                <form id="uploadForm" class="space-y-4">
                    <label class="block text-sm text-gray-700">
                        BPM流程号 <span class="text-red-500">*</span>
                        <input type="text" id="uploadBpmNo" class="mt-1 w-full rounded border px-3 py-2 text-sm font-mono uppercase outline-none focus:ring-1 focus:ring-blue-400" placeholder="例如 EG-B015-26050127" required>
                    </label>
                    <input type="file" id="excelFile" accept=".xls,.xlsx" class="block w-full text-sm text-gray-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-full file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-50 file:text-blue-700
                        hover:file:bg-blue-100
                    "/>
                    <button type="submit" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        上传并清洗入库
                    </button>
                </form>
            </div>

            <!-- 进度区域 -->
            <div id="progressCard" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
                <h2 class="text-lg font-semibold mb-4 text-gray-700">处理进度</h2>
                <div id="progressContent" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <!-- 数据库成本分析表预览 -->
    <div id="previewModal" class="fixed inset-0 z-50 hidden bg-black/40 p-4 sm:p-8">
        <div class="mx-auto flex h-full max-w-7xl flex-col overflow-hidden rounded-lg bg-white shadow-xl">
            <div class="flex items-center justify-between border-b px-4 py-3">
                <div>
                    <h2 class="text-base font-semibold text-gray-800">成本分析表预览</h2>
                    <p id="previewCode" class="text-xs font-mono text-gray-500"></p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400">数据库实时渲染</span>
                    <span id="previewSaveStatus" class="text-xs text-gray-400"></span>
                    <button id="previewExportBtn" class="text-sm text-blue-600 hover:text-blue-800" onclick="exportPreviewExcel()">导出 Excel</button>
                    <button id="previewEditBtn" class="text-sm text-blue-600 hover:text-blue-800" onclick="enablePreviewEditing()">编辑</button>
                    <button id="previewSaveBtn" class="hidden text-sm text-green-600 hover:text-green-800" onclick="savePreviewChanges()">保存</button>
                    <button id="previewCancelBtn" class="hidden text-sm text-gray-500 hover:text-gray-700" onclick="cancelPreviewEditing()">取消</button>
                    <button class="text-2xl leading-none text-gray-400 hover:text-gray-700" onclick="closePreview()" title="关闭">×</button>
                </div>
            </div>
            <div id="previewLoading" class="flex flex-1 items-center justify-center text-sm text-gray-500">正在加载数据库内容...</div>
            <iframe id="previewFrame" class="hidden h-full w-full flex-1 border-0 bg-gray-50" title="成本分析表预览"></iframe>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('token');
        const displayName = sessionStorage.getItem('displayName') || sessionStorage.getItem('userName') || '';
        const isAdmin = sessionStorage.getItem('isAdmin') === '1';
        if (!token) { window.location.href = '/static/login.html'; }
        if (sessionStorage.getItem('role') === 'reviewer') { window.location.href = '/static/review-v2/index.html'; }

        // 时间问候语 + 头像
        (function renderGreeting() {
            const h = new Date().getHours();
            let emoji, greeting;
            if (h >= 6 && h < 9)   { emoji = '🌅'; greeting = '早上好'; }
            else if (h >= 9 && h < 12) { emoji = '☀️'; greeting = '上午好'; }
            else if (h >= 12 && h < 14) { emoji = '🌞'; greeting = '中午好'; }
            else if (h >= 14 && h < 18) { emoji = '🌤️'; greeting = '下午好'; }
            else                   { emoji = '🌙'; greeting = '晚上好'; }

            const initial = displayName.charAt(0);
            const adminBadge = isAdmin ? '<span class=\"text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full font-bold ml-1\">管理员</span>' : '';
            document.getElementById('greetingBox').innerHTML =
                '<div class=\"w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold shrink-0\">' +
                    initial +
                '</div>' +
                '<span class=\"text-sm text-gray-700\">' +
                    '<span class=\"text-gray-400\">' + emoji + '</span> ' +
                    '<span class=\"font-medium\">' + greeting + '</span>' +
                    '<span class=\"text-gray-400\">，</span>' +
                    '<span class=\"font-semibold text-blue-700\">' + displayName + '</span>' +
                    adminBadge +
                '</span>';
        })();

        function logout() { sessionStorage.clear(); window.location.href = '/static/login.html'; }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        let deleteToastTimer = null;

        function showDeleteToast(code) {
            const toast = document.getElementById('deleteToast');
            document.getElementById('deleteToastText').textContent = '已删除 ' + code + ' 成本分析号';
            toast.classList.remove('hidden');
            if (deleteToastTimer) clearTimeout(deleteToastTimer);
            deleteToastTimer = setTimeout(hideDeleteToast, 3000);
        }

        function hideDeleteToast() {
            const toast = document.getElementById('deleteToast');
            toast.classList.add('hidden');
            if (deleteToastTimer) {
                clearTimeout(deleteToastTimer);
                deleteToastTimer = null;
            }
        }

        function toChineseError(msg) {
            if (!msg) return '未知错误';
            const m = msg.toLowerCase();
            if (m.includes('connection') && m.includes('timeout')) return '连接超时，请检查网络后重试';
            if (m.includes('connection') && m.includes('refused')) return '服务未启动，请联系管理员';
            if (m.includes('network')) return '网络异常，请检查网络连接';
            if (m.includes('timeout')) return '请求超时，AI 服务响应过慢，请稍后重试';
            if (m.includes('rate limit') || m.includes('too many')) return '请求过于频繁，请稍后重试';
            if (m.includes('unauthorized') || m.includes('401')) return '登录已过期，请重新登录';
            if (m.includes('forbidden') || m.includes('403')) return '无权限执行此操作';
            if (m.includes('not found') || m.includes('404')) return '服务地址错误，请联系管理员';
            if (m.includes('413') || m.includes('entity too large')) return '文件过大，请压缩后重试（最大 50MB）';
            if (m.includes('500') || m.includes('internal server')) return '服务器内部错误，请稍后重试';
            if (m.includes('json') && (m.includes('decode') || m.includes('parse'))) return 'AI 返回格式异常，请重试';
            if (m.includes('llm returned empty')) return 'AI 未能识别该报价单，请检查 Excel 内容';
            if (m.includes('excel') || m.includes('xlsx') || m.includes('openpyxl')) return 'Excel 文件格式异常，请检查文件是否损坏';
            return msg;
        }

        async function readErrorMessage(res, fallback) {
            const text = await res.text();
            if (!text) return fallback;
            try {
                const data = JSON.parse(text);
                return data.detail || data.message || fallback;
            } catch {
                return text;
            }
        }

        // ============ 上传历史 ============
        let historyData = [];  // 缓存原始数据用于搜索过滤

        let searchDebounceTimer = null;

        async function loadHistory(search) {
            const list = document.getElementById('historyList');
            try {
                let url = '/api/v1/etl/history';
                if (search) {
                    url += '?search=' + encodeURIComponent(search);
                }
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!data.history || data.history.length === 0) {
                    historyData = [];
                    list.innerHTML = '<div class="text-sm text-gray-400 text-center py-4">暂无上传记录</div>';
                    return;
                }
                historyData = data.history;
                renderHistory(historyData);
            } catch (err) {
                list.innerHTML = '<div class="text-sm text-red-400 text-center py-4">加载失败</div>';
            }
        }

        function filterHistory() {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(function () {
                const keyword = (document.getElementById('historySearch').value || '').trim();
                loadHistory(keyword);
            }, 300);
        }

        function renderHistory(groups) {
            const list = document.getElementById('historyList');
            if (!groups || groups.length === 0) {
                list.innerHTML = '<div class="text-sm text-gray-400 text-center py-4">无匹配记录</div>';
                return;
            }
            list.innerHTML = groups.map(group => {
                const rows = group.items.map(it => {
                    const time = it.create_time ? it.create_time.replace('T', ' ').substring(11, 16) : '';
                    const tooltip = [it.customer_name, it.package_method, it.product_spec, it.filename, it.upload_user].filter(Boolean).join(' | ');
                    const uploader = it.upload_user
                        ? '<span class=\"text-xs text-gray-400 mr-1\" title=\"上传人\">' + escapeHtml(it.upload_user) + '</span>'
                        : '';
                    const encodedCode = encodeURIComponent(it.quotation_code);
                    const instanceId = it.instance_id || '';
                    return '<div class="flex items-center justify-between py-1.5 px-2 rounded hover:bg-gray-50 group">' +
                        '<button class="flex-1 min-w-0 text-left" title="' + escapeHtml(tooltip) + '" onclick="previewQuotation(decodeURIComponent(\'' + encodedCode + '\'), ' + (instanceId || 'null') + ')">' +
                            '<span class="text-xs font-mono text-gray-800 truncate block">' + escapeHtml(it.quotation_code) + '</span>' +
                            '<span class="text-xs font-mono text-blue-500 truncate block">' + escapeHtml(it.bpm_no || '-') + '</span>' +
                            '<span class="text-xs text-gray-400 truncate block">报价日期：' + escapeHtml(it.quote_date || '-') + '</span>' +
                            '<span class="text-xs text-gray-400 truncate block">' + escapeHtml([it.customer_name, it.package_method, it.product_spec].filter(Boolean).join(' ')).substring(0, 24) + '</span>' +
                            '<span class="text-xs text-gray-400 truncate block">上传人：' + escapeHtml(it.upload_user || '-') + '</span>' +
                        '</button>' +
                        '<div class="flex items-center gap-2 shrink-0">' +
                            uploader +
                            '<span class="text-xs text-gray-400">' + time + '</span>' +
                            (it.review_status === 'quoted' ? '<span class="text-xs text-green-600">已报价</span>' :
                            ((isAdmin || it.upload_user === displayName) ? '<button class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition text-xs" onclick="deleteQuotation(decodeURIComponent(\'' + encodedCode + '\'), this, ' + (instanceId || 'null') + ')" title="删除">✕</button>' : '')) +
                        '</div>' +
                    '</div>';
                }).join('');
                return '<div class="mb-3">' +
                    '<div class="text-xs text-gray-500 font-medium mb-1 pl-2">' + group.date + '</div>' +
                    '<div class="border rounded-lg divide-y">' + rows + '</div>' +
                '</div>';
            }).join('');
        }

        async function deleteQuotation(code, btnEl, instanceId) {
            if (!confirm('确认删除成本分析号 ' + code + ' 吗？此操作不可撤销。')) return;
            btnEl.disabled = true;
            try {
                let query = 'code=' + encodeURIComponent(code);
                if (instanceId) query += '&instance_id=' + encodeURIComponent(instanceId);
                const res = await fetch('/api/v1/etl/quotation?' + query, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error(await readErrorMessage(res, '删除失败'));
                // 重新加载历史（保留搜索关键词）
                const keyword = (document.getElementById('historySearch').value || '').trim();
                loadHistory(keyword);
                showDeleteToast(code);
            } catch (err) {
                alert('删除失败: ' + err.message);
                btnEl.disabled = false;
            }
        }

        let previewQuotationCode = '';
        let previewInstanceId = null;
        let previewReviewStatus = 'pending';

        function previewQueryParams() {
            let query = 'code=' + encodeURIComponent(previewQuotationCode || '');
            if (previewInstanceId) query += '&instance_id=' + encodeURIComponent(previewInstanceId);
            return query;
        }

        async function previewQuotation(code, instanceId) {
            const modal = document.getElementById('previewModal');
            const loading = document.getElementById('previewLoading');
            const frame = document.getElementById('previewFrame');
            previewQuotationCode = code;
            if (instanceId !== undefined) previewInstanceId = instanceId ? Number(instanceId) : null;
            previewReviewStatus = historyData.flatMap(group => group.items).find(item =>
                previewInstanceId ? Number(item.instance_id) === Number(previewInstanceId) : item.quotation_code === code
            )?.review_status || 'pending';
            document.getElementById('previewCode').textContent = code;
            modal.classList.remove('hidden');
            loading.classList.remove('hidden');
            loading.textContent = '正在加载数据库内容...';
            frame.classList.add('hidden');
            frame.removeAttribute('srcdoc');
            resetPreviewToolbar();
            document.getElementById('previewEditBtn').classList.toggle('hidden', previewReviewStatus === 'quoted');

            try {
                const res = await fetch('/api/v1/etl/quotation/preview?' + previewQueryParams(), {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error(await readErrorMessage(res, '预览加载失败'));
                frame.srcdoc = await res.text();
                loading.classList.add('hidden');
                frame.classList.remove('hidden');
            } catch (err) {
                loading.textContent = '加载失败：' + err.message;
            }
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewFrame').removeAttribute('srcdoc');
            previewQuotationCode = '';
            previewInstanceId = null;
            resetPreviewToolbar();
        }

        function resetPreviewToolbar() {
            document.getElementById('previewEditBtn').classList.toggle('hidden', previewReviewStatus === 'quoted');
            document.getElementById('previewSaveBtn').classList.add('hidden');
            document.getElementById('previewCancelBtn').classList.add('hidden');
            document.getElementById('previewSaveStatus').textContent = '';
        }

        function enablePreviewEditing() {
            if (previewReviewStatus === 'quoted') return;
            const frame = document.getElementById('previewFrame');
            const inputs = frame.contentDocument.querySelectorAll('.sheet-input');
            inputs.forEach(input => { input.disabled = false; });
            document.getElementById('previewEditBtn').classList.add('hidden');
            document.getElementById('previewSaveBtn').classList.remove('hidden');
            document.getElementById('previewCancelBtn').classList.remove('hidden');
            document.getElementById('previewSaveStatus').textContent = '编辑中';
        }

        function cancelPreviewEditing() {
            if (previewQuotationCode) previewQuotation(previewQuotationCode, previewInstanceId);
        }

        async function savePreviewChanges() {
            const frame = document.getElementById('previewFrame');
            const saveBtn = document.getElementById('previewSaveBtn');
            const status = document.getElementById('previewSaveStatus');
            const inputs = frame.contentDocument.querySelectorAll('.sheet-input');
            const changes = Array.from(inputs)
                .filter(input => input.value !== input.defaultValue)
                .map(input => ({
                    entity: input.dataset.entity,
                    id: Number(input.dataset.id),
                    field: input.dataset.field,
                    value: input.value,
                }));

            if (changes.length === 0) {
                status.textContent = '没有修改';
                return;
            }

            saveBtn.disabled = true;
            status.textContent = '正在保存...';
            try {
                const res = await fetch('/api/v1/etl/quotation?' + previewQueryParams(), {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ changes }),
                });
                const responseText = await res.text();
                let data = {};
                if (responseText) {
                    try {
                        data = JSON.parse(responseText);
                    } catch {
                        if (!res.ok) throw new Error(responseText);
                    }
                }
                if (!res.ok) throw new Error(data.detail || data.message || '保存失败');
                previewQuotationCode = data.quotation_code;
                document.getElementById('previewCode').textContent = previewQuotationCode;
                await loadHistory();
                await previewQuotation(previewQuotationCode, previewInstanceId);
                document.getElementById('previewSaveStatus').textContent = '已保存';
            } catch (err) {
                status.textContent = '保存失败';
                alert('保存失败: ' + err.message);
            } finally {
                saveBtn.disabled = false;
            }
        }

        async function exportPreviewExcel() {
            if (!previewQuotationCode) return;
            const btn = document.getElementById('previewExportBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/api/v1/etl/quotation/export?' + previewQueryParams(), {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error(await readErrorMessage(res, '导出失败'));
                const url = URL.createObjectURL(await res.blob());
                const link = document.createElement('a');
                link.href = url;
                link.download = previewQuotationCode + '.xlsx';
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('导出失败: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        loadHistory();

        // ============ 上传处理 (SSE) ============
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('excelFile');
            const bpmInput = document.getElementById('uploadBpmNo');
            const uploadBtn = document.getElementById('uploadBtn');
            const progressCard = document.getElementById('progressCard');
            const progressContent = document.getElementById('progressContent');

            const bpmNo = (bpmInput.value || '').trim().toUpperCase();
            if (!bpmNo) { alert('请先填写 BPM流程号'); bpmInput.focus(); return; }
            if (!fileInput.files.length) { alert('请选择文件'); return; }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('bpm_no', bpmNo);

            uploadBtn.disabled = true;
            uploadBtn.textContent = '正在处理...';
            progressCard.classList.remove('hidden');
            progressContent.innerHTML =
                '<div class="flex items-center gap-2 text-blue-600">' +
                '<svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>' +
                '正在扫描 Excel 文件...</div>';

            try {
                const response = await fetch('/api/v1/etl/upload_excel', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData,
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || '上传失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const event = JSON.parse(line.slice(6));
                        handleEvent(event, progressContent);
                    }
                }
            } catch (err) {
                const friendlyMsg = toChineseError(err.message);
                progressContent.innerHTML = '<div class="text-red-600 font-semibold">✘ ' + escapeHtml(friendlyMsg) + '</div>';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传并清洗入库';
                fileInput.value = '';
                bpmInput.value = '';
                loadHistory(); // 上传完成后刷新历史
            }
        });

        function handleEvent(event, container) {
            switch (event.event) {
                case 'scanned':
                    if (event.total === 0) {
                        container.innerHTML = '<div class="text-yellow-600">未识别到任何成本分析表，请检查文件内容。</div>';
                    } else {
                        container.innerHTML =
                            '<div class="text-blue-700 font-semibold text-lg">共识别到 ' + event.total + ' 个成本分析表</div>' +
                            '<div class="text-sm text-gray-500">扫描耗时 ' + event.scan_time + ' 秒，开始并行解析...</div>' +
                            '<div class="w-full bg-gray-200 rounded-full h-4 mt-2"><div id="progressBar" class="bg-blue-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div></div>' +
                            '<div id="progressText" class="text-sm text-gray-600 mt-1"></div>' +
                            '<div id="progressList" class="max-h-60 overflow-y-auto space-y-1 mt-2 text-sm font-mono"></div>';
                    }
                    break;

                case 'progress': {
                    const bar = document.getElementById('progressBar');
                    const text = document.getElementById('progressText');
                    const list = document.getElementById('progressList');
                    const pct = Math.round(event.current / event.total * 100);
                    if (bar) bar.style.width = pct + '%';
                    if (text) text.textContent = '正在解析第 ' + event.current + '/' + event.total + ' 个';
                    if (list) {
                        const statusIcon = event.error ? '✘' : '✔';
                        const statusColor = event.error ? 'text-red-500' : 'text-green-500';
                        const line = document.createElement('div');
                        line.className = statusColor;
                        line.textContent = statusIcon + ' [' + event.current + '/' + event.total + '] ' + event.quotation_code + ' (' + event.llm_time + 's)';
                        if (event.error) line.textContent += ' — ' + toChineseError(event.error);
                        list.prepend(line);
                    }
                    break;
                }

                case 'reused': {
                    const list = document.getElementById('progressList');
                    if (list) {
                        const line = document.createElement('div');
                        line.className = 'text-blue-600 font-mono';
                        line.textContent = '↻ 复用: ' + event.quotation_code + ' — ' + (event.bpm_no || '') + ' 已登记';
                        list.prepend(line);
                    }
                    break;
                }

                case 'skipped': {
                    const list = document.getElementById('progressList');
                    if (list) {
                        const isBatchDup = event.reason === 'batch_dup';
                        const icon = isBatchDup ? '⚠' : '⛔';
                        const colorClass = isBatchDup ? 'text-yellow-600' : 'text-orange-500';
                        const label = event.reason === 'content_changed'
                            ? '同号内容不一致'
                            : (event.reason === 'quoted_instance' ? '已报价不覆盖' : (isBatchDup ? '批次内重复' : '历史已存在'));
                        const line = document.createElement('div');
                        line.className = colorClass + ' font-mono';
                        line.textContent = icon + ' 跳过: ' + event.quotation_code + ' — ' + label;
                        list.prepend(line);
                    }
                    break;
                }

                case 'db_write':
                    container.innerHTML += '<div class="text-orange-600 font-semibold mt-2">' + event.message + '</div>';
                    break;

                case 'complete': {
                    const line = document.createElement('div');
                    line.className = 'text-green-700 font-semibold text-lg mt-3 border-t pt-3';
                    line.textContent = '入库完成！成功 ' + event.processed + ' 个报价单';
                    if (event.reused > 0) line.textContent += '，复用已有 ' + event.reused + ' 个';
                    if (event.llm_errors > 0) line.textContent += '，LLM 解析失败 ' + event.llm_errors + ' 个';
                    if (event.dup_within_batch > 0) line.textContent += '，批次内重复跳过 ' + event.dup_within_batch + ' 个';
                    if (event.db_duplicates > 0) line.textContent += '，已存在跳过 ' + event.db_duplicates + ' 个';
                    if (event.content_conflicts > 0) line.textContent += '，同号内容不一致跳过 ' + event.content_conflicts + ' 个';
                    if (event.db_errors > 0) line.textContent += '，DB 写入失败 ' + event.db_errors + ' 个';
                    if (event.db_time !== undefined) line.textContent += '（DB 写入耗时 ' + event.db_time + 's）';
                    container.appendChild(line);
                    break;
                }
            }
        }
    </script>
</body>
</html>
